  "lockfile-version": 1,
  "manifest": {
    "version": 1,
    "install": {
      "jq": {
        "pkg-path": "jq"
      },
      "python3": {
        "pkg-path": "python312"
      },
      "sqlite": {
        "pkg-path": "sqlite"
      }
    },
    "vars": {
      "PYTHONDONTWRITEBYTECODE": "1",
      "PYTHONUNBUFFERED": "1"
    },
    "hook": {
      "on-activate": "  # Create or reuse Python venv\n  if [ ! -d \"$FLOX_ENV_PROJECT/.venv\" ]; then\n    echo \"📦 Creating Python venv...\"\n    python3 -m venv \"$FLOX_ENV_PROJECT/.venv\"\n  fi\n  source \"$FLOX_ENV_PROJECT/.venv/bin/activate\"\n\n  # Install dependencies if requirements changed\n  REQ=\"$FLOX_ENV_PROJECT/requirements.txt\"\n  MARKER=\"$FLOX_ENV_PROJECT/.venv/.deps-installed\"\n  if [ \"$REQ\" -nt \"$MARKER\" ] 2>/dev/null || [ ! -f \"$MARKER\" ]; then\n    echo \"📦 Installing Python dependencies...\"\n    pip install -q -r \"$REQ\" && touch \"$MARKER\"\n  fi\n\n  # Source .env if present\n  if [ -f \"$FLOX_ENV_PROJECT/.env\" ]; then\n    set -a\n    source \"$FLOX_ENV_PROJECT/.env\"\n    set +a\n  fi\n"
    },
    "profile": {
      "common": "  echo \"\"\n  echo \"  Workflow Harvester dev environment\"\n  echo \"  ─────────────────────────────────\"\n  echo \"  python main.py          — run scraping pipeline\"\n  echo \"  python onboard.py       — onboard agents to registry\"\n  echo \"  python search.py \\\"...\\\"  — semantic search\"\n  echo \"  flox services start     — start API server\"\n  echo \"  flox services status    — check service status\"\n  echo \"\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "x86_64-darwin",
        "aarch64-linux",
        "x86_64-linux"
      ]
    },
    "services": {
      "api": {
        "command": "uvicorn api.app:app --host 0.0.0.0 --port 8000"
      }
    }
  },
